spring.application.name=task-manager-backend

# Primary datasource (Spring Boot standard)
spring.datasource.url=jdbc:postgresql://localhost:5432/task_manager
spring.datasource.username=task_user
spring.datasource.password=task_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Explicit Hibernate dialect to avoid metadata-based detection failures
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration